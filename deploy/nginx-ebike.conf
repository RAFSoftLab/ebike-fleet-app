# eBike Fleet Management — nginx site config (HTTP, IP-only, single port).
#
# Serves the built React SPA as static files and reverse-proxies /api -> backend.
# __LISTEN_PORT__ and __WEBROOT__ are substituted by deploy.sh. If you edit this
# file by hand, replace them with your chosen free port and the web root dir.
#
# Public entry point:  http://<SERVER_IP>:__LISTEN_PORT__

server {
    listen __LISTEN_PORT__;
    listen [::]:__LISTEN_PORT__;
    server_name _;

    # Built SPA. deploy.sh copies frontend/dist here (a system web root nginx can
    # read) — serving from a home directory fails because nginx (www-data) can't
    # traverse into /home/<user>.
    root __WEBROOT__;
    index index.html;

    # Allow reasonably large uploads (PDFs etc.)
    client_max_body_size 20m;

    # API: strip the /api prefix and forward to the backend on localhost.
    #   /api/auth/login  ->  http://127.0.0.1:8000/auth/login
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA client-side routing: fall back to index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively.
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
